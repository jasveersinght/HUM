<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>HUM</title>
<meta name="description" content="AI Voice and Vision Companion" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-color: #f7f9fc;
    --text-main: #111827;
    --text-muted: #6b7280;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --card-bg: #ffffff;
    --shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background-color: var(--bg-color);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
  }

  /* FULL SCREEN CLICK HANDLER FOR ACCESSIBILITY */
  #interaction-layer {
    position: absolute;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    cursor: pointer;
  }
  #interaction-layer h1 { font-size: 2rem; font-weight: 900; margin-bottom: 10px; }
  #interaction-layer p { font-size: 1.1rem; color: var(--text-muted); text-align: center; padding: 0 20px; }

  /* FLOATING AESTHETIC ELEMENTS */
  .floater {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    z-index: 0;
    opacity: 0.6;
    animation: float 10s ease-in-out infinite alternate;
  }
  .f1 { width: 300px; height: 300px; background: #bfdbfe; top: -100px; left: -100px; }
  .f2 { width: 400px; height: 400px; background: #e0e7ff; bottom: -150px; right: -100px; animation-delay: -3s; }
  .f3 { width: 200px; height: 200px; background: #fecaca; top: 40%; left: 60%; animation-delay: -5s; }
  @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

  /* MAIN LAYOUT */
  main {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0 30px 0;
  }
  .logo {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -0.05em;
    color: var(--text-main);
  }
  .status {
    font-size: 0.85rem;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 30px;
    background: #e5e7eb;
    color: var(--text-muted);
    transition: all 0.3s;
  }
  .status.active { background: #dcfce7; color: #166534; }
  .status.listening { background: #dbeafe; color: #1e40af; }
  .status.navigating { background: #fef08a; color: #854d0e; animation: pulseNav 2s infinite; }
  @keyframes pulseNav { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* CAMERA FEED */
  .camera-container {
    flex: 1;
    position: relative;
    border-radius: 32px;
    overflow: hidden;
    background: #e5e7eb;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* REMOVED scaleX(-1) so rear camera is not mirrored! */
  }
  .cam-placeholder {
    position: absolute;
    text-align: center;
    color: #9ca3af;
    font-size: 1.1rem;
    font-weight: 700;
  }
  canvas { display: none; }

  /* CAPTION AREA */
  .caption {
    text-align: center;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--primary);
    min-height: 80px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 10px;
    line-height: 1.4;
  }

  /* MASSIVE MIC BUTTON */
  .mic-container {
    height: 160px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  .mic-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--primary);
    border: none;
    box-shadow: 0 20px 40px -10px rgba(37, 99, 235, 0.5);
    color: white;
    font-size: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 20;
  }
  .mic-btn:active { transform: scale(0.9); box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.5); }
  .mic-btn.recording {
    background: #ef4444;
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
    animation: pulseMic 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
  }
  @keyframes pulseMic {
    to { box-shadow: 0 0 0 40px rgba(239, 68, 68, 0); }
  }
  
  /* OVERLAYS */
  #apiOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hidden { display: none !important; }
  .modal {
    background: white;
    padding: 40px;
    border-radius: 24px;
    width: 90%;
    max-width: 400px;
    text-align: center;
  }
  .modal h2 { margin-bottom: 10px; font-weight: 900; }
  .modal input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #e5e7eb; margin-bottom: 20px; font-size: 1rem; }
  .modal button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--text-main); color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
</style>
</head>
<body>

<div class="floater f1"></div>
<div class="floater f2"></div>
<div class="floater f3"></div>

<!-- FIRST TOUCH OVERLAY -->
<div id="interaction-layer" onclick="startExperience()">
  <h1>TAP ANYWHERE</h1>
  <p>Tap anywhere on the screen to wake up HUM and activate the camera and microphone.</p>
</div>

<!-- API KEY MODAL (Failsafe) -->
<div class="hidden" id="apiOverlay">
  <div class="modal">
    <h2>API Key</h2>
    <p style="margin-bottom:20px;color:var(--text-muted)">Please enter your Gemini API key.</p>
    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." />
    <button onclick="saveApiKey()">CONNECT</button>
    <button onclick="closeApiModal()" style="margin-top:10px;background:none;color:var(--text-muted);">Skip (.env file)</button>
  </div>
</div>

<main>
  <header>
    <div class="logo">HUM.</div>
    <div class="status" id="statusBadge">SLEEPING</div>
  </header>

  <div class="camera-container">
    <div class="cam-placeholder" id="camPlaceholder">CAMERA WAKING UP...</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="caption" id="captionText">
    Tap the screen once, then say "Hello HUM" to ask a question or start navigation.
  </div>

  <div class="mic-container">
    <!-- Extremely large mic button -->
    <button class="mic-btn" id="micBtn" onclick="manualTrigger()">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>
</main>

<script>
// --- STATE ---
let stream = null;
let recognition = null;
let isListening = false;
let isSpeaking = false;
let isProcessing = false;
let browserApiKey = null;
let cameraReady = false;

// Navigation State
let isNavigating = false;
let navigationTarget = "";

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const captionText = document.getElementById('captionText');
const statusBadge = document.getElementById('statusBadge');
const micBtn = document.getElementById('micBtn');

// --- SYSTEM PROMPTS ---
const SYSTEM_PROMPT = `You are HUM, an AI vision companion designed specifically for visually impaired and blind users. 
Your role is to be their eyes.
Rules:
- Give very direct, high-utility answers (1-3 sentences max).
- Speak naturally and conversationally.
- State safety hazards immediately if present.
- Never mention "I see an image of" or "In the picture". Act as if you are standing right there looking with them.`;

const NAVIGATION_PROMPT = `You are a real-time tracking and navigation assistant guiding a blind person physically.
CONTEXT: The user's goal is: [TARGET]
RULES:
1. Examine the raw camera frame directly in front of them.
2. Give exactly ONE short, punchy directional command based on the image. Do not explain anything.
3. Examples of valid commands: 
   "Pan left", "Pan right", "Scan the room", "Walk forward", "Stop, obstacle ahead", "Turn slightly right", "Target is right in front of you."
4. If they have clearly reached the target object/place, say "You have reached your destination."
5. Be concise. Your output must be less than 5 words so they can walk safely in real-time.`;

// --- UI HELPERS ---
function setStatus(text, stateClass) {
  statusBadge.textContent = text;
  statusBadge.className = 'status ' + stateClass;
}
function setCaption(text) {
  captionText.textContent = text;
}

// --- INITIALIZATION (TAP TO WAKE) ---
async function startExperience() {
  document.getElementById('interaction-layer').classList.add('hidden');
  
  // 1. Initialize empty speech synthesis to unlock audio context in mobile browsers
  const unlockUtterance = new SpeechSynthesisUtterance('');
  window.speechSynthesis.speak(unlockUtterance);
  
  // 2. Start Camera (rear-facing standard, un-mirrored)
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream;
    document.getElementById('camPlaceholder').classList.add('hidden');
    cameraReady = true;
  } catch(e) {
    setCaption("Could not start camera. Please check permissions.");
  }

  // 3. Start Continuous Voice Recognition Loop
  initSpeechRecognition();
  
  speak("HUM is awake. Say Hello Hum, followed by your question or destination.");
}

// --- SPEECH RECOGNITION (WAKE WORD LOOP) ---
function initSpeechRecognition() {
  // If navigating, we don't spin up the strict listener because we are busy taking pictures
  if(isNavigating) return;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setCaption("Speech recognition not supported in this browser. Please use Chrome.");
    return;
  }

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isListening = true;
    if(!isProcessing && !isSpeaking && !isNavigating) {
       setStatus("LISTENING", "listening");
    }
  };

  recognition.onresult = (e) => {
    // If we're already processing a command or speaking an answer, ignore transcript
    if (isProcessing || isSpeaking) return;

    let transcript = '';
    for(let i=e.resultIndex; i<e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    transcript = transcript.trim().toLowerCase();

    // Check for Wake Word
    if (transcript.includes('hello hum') || transcript.includes('hello ham') || transcript.includes('lo hum')) {
      
      // We found the wake word! Stop the listener temporarily.
      recognition.stop();
      isProcessing = true;
      micBtn.classList.add('recording');
      setStatus("PROCESSING", "active");

      // Extract the command after the wake word if they said it all in one sentence
      let command = transcript.replace(/.*hello h[ua]m/i, '').trim();
      
      // Handle explicit stop commands if somehow triggered
      if (['stop', 'cancel', 'end'].includes(command)) {
         handleStopCommand();
         return;
      }

      if (command.length > 5) {
        // They asked a question immediately
        setCaption(`"${command}"`);
        checkNavIntentAndProcess(command);
      } else {
        // They just said "Hello hum" and paused. 
        speakAndListenForCommand("I'm here, what do you need?");
      }
    }
  };

  recognition.onend = () => {
    isListening = false;
    // Auto-restart loop if not actively processing/speaking/navigating
    if (!isProcessing && !isSpeaking && !isNavigating) {
      setTimeout(() => {
        try { recognition.start(); } catch(e){}
      }, 500);
    }
  };

  recognition.onerror = (e) => {
    // Ignore errors, loop will auto-restart onend
  };

  try { recognition.start(); } catch(e) {}
}

function handleStopCommand() {
  if (isNavigating) {
     isNavigating = false;
     speak("Navigation stopped.", resetToIdle);
  } else {
     speak("Okay.", resetToIdle);
  }
}

// If they just say "Hello Hum", we beep/speak and wait for 1 statement
function speakAndListenForCommand(promptText) {
  speak(promptText, () => {
    // Listen strictly for the next phrase
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const cmdRec = new SR();
    cmdRec.continuous = false;
    cmdRec.interimResults = false;
    
    cmdRec.onstart = () => {
      setStatus("AWAITING QUESTION", "recording");
      setCaption("Listening for your question...");
    };
    
    cmdRec.onresult = (e) => {
      let finalCommand = e.results[0][0].transcript.toLowerCase();
      setCaption(`"${finalCommand}"`);
      
      if (['stop', 'cancel', 'nevermind'].includes(finalCommand.trim())) {
        handleStopCommand();
      } else {
        checkNavIntentAndProcess(finalCommand);
      }
    };
    
    cmdRec.onerror = () => {
      isProcessing = false;
      micBtn.classList.remove('recording');
      initSpeechRecognition(); // drop back to wake word loop
    };
    
    cmdRec.onend = () => {
      if(!isProcessing && !isNavigating) { // if no result arrived
         micBtn.classList.remove('recording');
         initSpeechRecognition(); 
      }
    };
    
    cmdRec.start();
  });
}

// Large Mic Button triggers manual query instantly (or acts as an emergency stop)
function manualTrigger() {
  // EMERGENCY STOP capability
  if (isProcessing || isSpeaking || isNavigating) {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    isProcessing = false;
    isNavigating = false;
    micBtn.classList.remove('recording');
    setCaption("Stopped. Tap mic to restart.");
    resetToIdle();
    return;
  }
  
  isProcessing = true;
  micBtn.classList.add('recording');
  try{ recognition.stop(); }catch(e){} // stop wake loop
  
  // Listen strictly for 1 command
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const manualRec = new SR();
  manualRec.continuous = false;
  manualRec.onstart = () => { setStatus("LISTENING", "recording"); setCaption("Listening..."); };
  manualRec.onresult = (e) => {
    let finalCommand = e.results[0][0].transcript;
    setCaption(`"${finalCommand}"`);
    checkNavIntentAndProcess(finalCommand);
  };
  manualRec.onerror = () => { isProcessing = false; micBtn.classList.remove('recording'); initSpeechRecognition(); };
  manualRec.start();
}


// --- INTENT ROUTING ---
function checkNavIntentAndProcess(cmd) {
  const navKeywords = ['guide me', 'head me', 'take me', 'navigate', 'find', 'show me where', 'lead me', 'point me', 'walk me'];
  let isNavCmd = navKeywords.some(keyword => cmd.toLowerCase().includes(keyword));
  
  if (isNavCmd) {
    isNavigating = true;
    navigationTarget = cmd;
    setCaption(`Navigation Mode: ${cmd}`);
    speak(`Guiding you. Please scan the room slowly.`, () => {
       // Start the continuous picture-taking loop
       navigationLoop();
    });
  } else {
    // Normal one-shot command
    isNavigating = false;
    processCommand(cmd);
  }
}

// --- CORE STANDARD LOGIC
async function processCommand(userText) {
  setStatus("ANALYZING", "active");
  const frame = captureFrame();
  
  const content = [];
  if (frame) {
    content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: frame } });
  }
  if (!userText || userText.trim() === '') userText = "Describe what is in front of me.";
  content.push({ type: 'text', text: userText });

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(browserApiKey ? { 'x-browser-api-key': browserApiKey } : {})
      },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content }]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'API Error');

    const reply = data.content[0].text;
    setCaption(reply);
    
    speak(reply, () => {
      // Audio finished -> reset back to idle wake-word loop
      resetToIdle();
    });

  } catch(e) {
    setCaption("Error: " + e.message);
    speak("I'm sorry, there was a connection error.", () => resetToIdle());
  }
}


// --- CONTINUOUS NAVIGATION LOGIC ---
async function navigationLoop() {
  // Check if user manually hit Stop
  if (!isNavigating) return;
  
  setStatus("NAVIGATING", "navigating");
  micBtn.classList.add('recording'); // keep mic red to indicate active recording/navigating
  
  const frame = captureFrame();
  const content = [];
  if (frame) content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: frame } });
  
  let currentPrompt = NAVIGATION_PROMPT.replace("[TARGET]", navigationTarget);
  content.push({ type: 'text', text: "Current view. Give ONE brief direction." });

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...(browserApiKey ? { 'x-browser-api-key': browserApiKey } : {}) },
      body: JSON.stringify({ system: currentPrompt, messages: [{ role: 'user', content }] })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    let reply = data.content[0].text;
    setCaption(reply); // Show the instruction
    
    // Check if arrived / finished
    let rLow = reply.toLowerCase();
    if (rLow.includes("reached") || rLow.includes("arrived") || rLow.includes("you are there") || rLow.includes("destination")) {
       isNavigating = false;
       speak(reply, resetToIdle);
    } else {
       // Speak the direction, then pause slightly, then take the next photo
       speak(reply, () => {
         if(isNavigating) {
           setTimeout(navigationLoop, 500); // Wait half a second before snapping next frame
         }
       });
    }

  } catch (e) {
    if(isNavigating) {
      setCaption("Network delay...");
      setTimeout(navigationLoop, 2000); // If fails, retry in 2 secs instead of crashing
    }
  }
}

function resetToIdle() {
  isProcessing = false;
  isSpeaking = false;
  isNavigating = false;
  micBtn.classList.remove('recording');
  setStatus("SLEEPING", "");
  setTimeout(() => {
    try{ recognition.start(); }catch(e){}
  }, 300);
}

function captureFrame() {
  if (!cameraReady) return null;
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  ctx.drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
}

// --- SPEECH SYNTHESIS ---
function speak(text, onCompleteCallback) {
  if (!('speechSynthesis' in window)) {
    if(onCompleteCallback) onCompleteCallback();
    return;
  }
  
  window.speechSynthesis.cancel();
  isSpeaking = true;
  if (!isNavigating) setStatus("SPEAKING", "active");
  
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 1.0;
  
  // Prefer natural English voices
  const voices = window.speechSynthesis.getVoices();
  const pref = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Samantha')));
  if (pref) utt.voice = pref;

  utt.onend = () => {
    isSpeaking = false;
    if (onCompleteCallback) onCompleteCallback();
  };
  utt.onerror = () => {
    isSpeaking = false;
    if (onCompleteCallback) onCompleteCallback();
  };

  window.speechSynthesis.speak(utt);
}

window.speechSynthesis.onvoiceschanged = () => {}; // preload

// --- MODAL UTILS ---
function saveApiKey(){ browserApiKey = document.getElementById('apiKeyInput').value; closeApiModal(); }
function closeApiModal(){ document.getElementById('apiOverlay').classList.add('hidden'); }
// Check backend connection on load gently
fetch('/api/analyze', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ system: 'test', messages: [{role: 'user', content: [{type:'text',text:'test'}]}] }) }).then(r => { if(r.status===401) document.getElementById('apiOverlay').classList.remove('hidden'); }).catch(e=>e);
</script>
</body>
</html>
